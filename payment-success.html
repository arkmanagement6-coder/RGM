<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Revanta Growth Media</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .success-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #050b14 100%);
            padding: 20px;
        }
        .success-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out forwards;
        }
        .success-icon {
            width: 100px;
            height: 100px;
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 30px;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.2);
        }
        .success-card h1 {
            color: var(--white);
            font-size: 2.2rem;
            margin-bottom: 15px;
        }
        .success-card p {
            color: var(--light-gray);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .success-details {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: left;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }
        .detail-row:last-child {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }
        .detail-label { color: var(--light-gray); }
        .detail-value { color: var(--white); font-weight: 600; }
        
        .whatsapp-next-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #25D366;
            color: #fff;
            padding: 16px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            width: 100%;
            justify-content: center;
        }
        .whatsapp-next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(37, 211, 102, 0.4);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <!-- Meta Pixel Code -->
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1428184878228303');
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=1428184878228303&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->
</head>
<body>
    <div class="success-page">
        <div class="success-card">
            <div class="success-icon">
                <i class="fa-solid fa-check"></i>
            </div>
            <h1>Payment Successful!</h1>
            <p>Thank you for choosing Revanta Growth Media. Your order for the E-commerce Website has been confirmed.</p>
            
            <div class="success-details">
                <div class="detail-row">
                    <span class="detail-label">Payment ID:</span>
                    <span class="detail-value" id="pay-id">Loading...</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Amount Paid:</span>
                    <span class="detail-value">₹5,000.00</span>
                </div>
            </div>

            <a href="https://wa.me/918821885577?text=Hi! I just completed my payment for the E-commerce website. Here is my Payment ID: " id="whatsapp-link" class="whatsapp-next-btn">
                <i class="fa-brands fa-whatsapp"></i> Send Details to our Team
            </a>
            
            <a href="index.html" style="display: block; margin-top: 20px; color: var(--light-gray); text-decoration: underline; font-size: 0.9rem;">Return to Homepage</a>
        </div>
    </div>

    <script>
        // Retrieve Payment ID from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const paymentId = urlParams.get('payment_id');
        
        if (paymentId) {
            document.getElementById('pay-id').innerText = paymentId;
            // Update WhatsApp link with payment ID
            const waBtn = document.getElementById('whatsapp-link');
            waBtn.href = waBtn.href + paymentId;
        } else {
            document.getElementById('pay-id').innerText = "Not found";
        }
    </script>
<script src="js/payment.js"></script>
</body>
</html>
